spring.application.name=backend-app
spring.datasource.url=jdbc:postgresql://${PGPGHOST}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# La magia de Hibernate: Crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ollama
spring.ai.ollama.base-url=http://localhost:11434

# Modelo que quieres usar
spring.ai.ollama.chat.model=gemma3:12b

# Opcional: respuestas más precisas y menos "creativas"
spring.ai.ollama.chat.temperature=0.2