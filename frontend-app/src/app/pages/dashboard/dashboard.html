<mat-toolbar color="primary">
  <span>Sistema de Inventario para Pequeños Negocios (MVP)</span>

  <span style="flex: 1 1 auto;"></span>

  <button mat-raised-button color="accent" (click)="logout()">
    Cerrar Sesión
  </button>
</mat-toolbar>

<div class="dashboard-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Bienvenido</mat-card-title>
      <mat-card-subtitle>Panel principal</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>
        Bienvenido al Sistema de Inventario para Pequeños Negocios (MVP).
      </p>

      <p>
        Desde este panel podrás administrar productos, inventario y consultar
        la información principal del sistema.
      </p>
    </mat-card-content>
  </mat-card>
</div>
